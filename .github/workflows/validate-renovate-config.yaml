name: Validate Renovate Config

permissions:
  contents: read

on:
  pull_request: {}

jobs:
  validate-renovate-config:
    name: Validate renovate config
    runs-on: ubuntu-latest
    container:
      image: renovate/renovate:43.214.2@sha256:94ea97399b0dfba2e42b9571fc5bca6e1fbf5e72ecf6062cfe6aba5bec76b19e
      options: --user root
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - run: renovate --version
      - run: renovate-config-validator default.json5
      - run: renovate-config-validator .github/renovate.json5
